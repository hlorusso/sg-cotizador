<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SG Impresiones · Cotizá tu pedido</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1F3864;--red:#BC002D;--green:#1E7A3E;--wa:#25D366;
  --light:#F2F4F8;--border:#D8DDE8;--text:#1a1a2e;--sub:#6B7280;
  --card:#fff;
}
html{background:var(--light)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--light);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}

/* ── Header ── */
.hdr{background:var(--navy);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:20}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-top h1{font-size:17px;font-weight:700;flex:1}
.hdr-top .step-lbl{font-size:12px;opacity:.7;white-space:nowrap}
.back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 6px;border-radius:6px;line-height:1}
.back:hover{background:rgba(255,255,255,.15)}
.prog{height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--red);border-radius:2px;transition:width .35s ease}

/* ── Content ── */
.content{padding:20px 16px 40px}

/* ── Question ── */
.q-icon{font-size:38px;margin-bottom:8px;display:block}
.q-title{font-size:21px;font-weight:800;color:var(--navy);line-height:1.25;margin-bottom:4px}
.q-sub{font-size:13px;color:var(--sub);margin-bottom:20px}

/* ── Product grid ── */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prod-btn{
  background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:14px 10px;text-align:center;cursor:pointer;
  font-size:12.5px;font-weight:600;color:var(--text);
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px;
  min-height:84px;justify-content:center;line-height:1.3
}
.prod-btn .e{font-size:26px;line-height:1}
.prod-btn:hover,.prod-btn:active{border-color:var(--navy);background:#EEF2FA;color:var(--navy)}

/* ── Option list ── */
.opts{display:flex;flex-direction:column;gap:9px}
.opt-btn{
  background:var(--card);border:2px solid var(--border);border-radius:12px;
  padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;
  font-size:14px;font-weight:600;color:var(--text);transition:all .15s;text-align:left
}
.opt-btn .opt-txt{flex:1;line-height:1.3}
.opt-btn .opt-sub{font-size:11.5px;color:var(--sub);font-weight:400;margin-top:2px;display:block}
.opt-btn .chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.opt-btn:hover,.opt-btn:active{border-color:var(--navy);background:#EEF2FA}
.opt-btn.sel{border-color:var(--navy);background:#EEF2FA;color:var(--navy)}
.opt-btn.sel .chk{background:var(--navy);border-color:var(--navy);color:#fff}

/* ── Extra info form ── */
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.field input,.field select{
  width:100%;border:2px solid var(--border);border-radius:10px;
  padding:13px 14px;font-size:15px;color:var(--text);background:var(--card);outline:none;
  font-family:inherit;appearance:none
}
.field input:focus,.field select:focus{border-color:var(--navy)}
.yn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.yn-btn{
  background:var(--card);border:2px solid var(--border);border-radius:10px;
  padding:13px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;
  color:var(--text);transition:all .15s
}
.yn-btn:hover{border-color:var(--navy);background:#EEF2FA}
.yn-btn.sel{border-color:var(--green);background:#E8F5EE;color:var(--green)}

/* ── Summary ── */
.sum-card{background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--border);margin-bottom:14px}
.sum-prod{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:4px}
.sum-tag{display:inline-block;background:#EEF2FA;color:var(--navy);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;margin-bottom:16px}
.sum-rows{display:flex;flex-direction:column;gap:0}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);gap:12px}
.sum-row:last-child{border-bottom:none;padding-bottom:0}
.sum-k{font-size:12.5px;color:var(--sub);font-weight:600;min-width:110px}
.sum-v{font-size:13.5px;font-weight:700;text-align:right;color:var(--text);flex:1}
.sum-note{font-size:12px;color:var(--sub);text-align:center;margin-bottom:6px}

/* ── Buttons ── */
.btn-primary{
  background:var(--navy);color:#fff;border:none;border-radius:12px;
  padding:16px;width:100%;font-size:15px;font-weight:700;cursor:pointer;
  margin-top:20px;font-family:inherit;transition:background .15s
}
.btn-primary:hover{background:#162a4f}
.btn-primary:disabled{background:#aaa;cursor:not-allowed}
.btn-wa{
  background:var(--wa);color:#fff;border:none;border-radius:12px;
  padding:16px;width:100%;font-size:15px;font-weight:700;cursor:pointer;
  margin-top:12px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none;transition:background .15s
}
.btn-wa:hover{background:#1eba56}
.btn-human{
  background:var(--red);color:#fff;border:none;border-radius:12px;
  padding:14px;width:100%;font-size:14px;font-weight:700;cursor:pointer;
  margin-top:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none
}

/* ── Welcome ── */
.welcome{text-align:center;padding:48px 20px 20px}
.welcome .logo{font-size:52px;margin-bottom:12px;display:block}
.welcome h2{font-size:26px;font-weight:800;color:var(--navy);margin-bottom:8px}
.welcome p{color:var(--sub);font-size:15px;line-height:1.5;margin-bottom:32px}
.btn-start{
  background:var(--red);color:#fff;border:none;border-radius:14px;
  padding:18px 32px;font-size:17px;font-weight:800;cursor:pointer;
  font-family:inherit;display:inline-flex;align-items:center;gap:10px
}
.footer-note{font-size:12px;color:var(--sub);text-align:center;margin-top:16px;line-height:1.5}
.divider{height:1px;background:var(--border);margin:12px 0}

/* ── Animation ── */
.fade{animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Scroll product list ── */
.scroll-hint{font-size:12px;color:var(--sub);text-align:center;padding:8px 0 0}
/* ── Arte info box ── */
.arte-box{background:#FFFBEA;border:2px solid #E6CE00;border-radius:14px;padding:16px;margin-top:12px}
.arte-box-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;
  color:#7A5800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.arte-formats{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.arte-fmt{display:flex;align-items:flex-start;gap:10px;background:#fff;border-radius:10px;padding:10px 12px;
  border:1px solid #FFD966}
.arte-fmt-tag{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;
  background:var(--dark);color:#fff;border-radius:6px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.arte-fmt-tag.best{background:var(--cyan)}
.arte-fmt-txt{font-size:13px;color:var(--dark);line-height:1.45}
.arte-fmt-txt strong{font-weight:700}
.dpi-box{background:#E0F5FD;border-radius:10px;padding:10px 12px;font-size:12.5px;color:#005070;line-height:1.6}
.dpi-box strong{font-weight:700}

</style>

  "4/0":"Full color · una cara",
  "4/1":"Full color adelante / 1 color atrás",
  "4/4":"Full color · dos caras"
};

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
const S = {
  screen:'welcome',
  product:null,
  steps:[],      // [{key, options}] — only attrs with >1 option
  autoSel:{},    // attrs auto-selected (single option)
  stepIdx:0,
  sel:{},        // manual selections
  extra:{nombre:'',cantidad:'',tieneArte:null,fecha:''}
};

// ─────────────────────────────────────────────────────────────────────────────
// LOGIC
// ─────────────────────────────────────────────────────────────────────────────
function buildSteps(prod) {
  const data = PRODUCTS[prod] || {};
  const auto = {}, steps = [];
  for (const [k, opts] of Object.entries(data)) {
    const filtered = opts.filter(o => o !== 'No' || opts.length > 1);
    if (opts.length === 0) continue;
    if (opts.length === 1) { auto[k] = opts[0]; continue; }
    // if all are "No" or single choice after filter, auto
    steps.push({key:k, options:opts});
  }
  return {auto, steps};
}

function displayVal(key, val) {
  if (key === 'Tintas') return TINTAS[val] ? `${val} — ${TINTAS[val]}` : val;
  return val;
}

function totalSteps() { return S.steps.length + 2; } // +2 for product + extra
function currentProgress() {
  if (S.screen === 'welcome') return 0;
  if (S.screen === 'product') return 5;
  if (S.screen === 'spec') return 10 + Math.round(((S.stepIdx+1)/totalSteps())*75);
  if (S.screen === 'extra') return 88;
  return 100;
}

// ─────────────────────────────────────────────────────────────────────────────
// GOOGLE SHEETS LOGGING
// ─────────────────────────────────────────────────────────────────────────────
function logToSheets() {
  if (!SHEETS_URL || SHEETS_URL === 'PEGAR_URL_DEL_SCRIPT_ACÁ') return;
  const allSel = {...S.autoSel, ...S.sel};
  const data = {
    nombre:        S.extra.nombre,
    producto:      S.product,
    papel:         allSel['Papel']          || '',
    tamano:        allSel['Tamaño']         || '',
    tintas:        allSel['Tintas']
                   ? (TINTAS[allSel['Tintas']] ? TINTAS[allSel['Tintas']][0] : allSel['Tintas'])
                   : '',
    doblado:       allSel['Doblado']        || '',
    laminado:      allSel['Laminado']       || '',
    corte:         allSel['Corte y Troquel']|| '',
    encuadernacion:allSel['Encuadernacion'] || '',
    cantidad:      S.extra.cantidad,
    arte:          S.extra.tieneArte === null ? ''
                   : S.extra.tieneArte ? 'Entrega arte' : 'Necesita diseño',
    fecha:         S.extra.fecha,
  };
  fetch(SHEETS_URL, {
    method: 'POST',
    mode:   'no-cors',
    headers:{'Content-Type':'application/json'},
    body:   JSON.stringify(data)
  }).catch(() => {});
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────────────────────────────────────
const app = document.getElementById('app');
function render() {
  app.innerHTML = '';
  app.className = 'fade';
  if (S.screen === 'welcome') renderWelcome();
  else if (S.screen === 'product') renderProduct();
  else if (S.screen === 'spec') renderSpec();
  else if (S.screen === 'extra') renderExtra();
  else if (S.screen === 'summary') renderSummary();
}

// ── Header helper ──────────────────────────────────────────────────────────
function renderHeader(title, stepLabel, showBack) {
  const prog = currentProgress();
  const hdr = document.createElement('div');
  hdr.className = 'hdr';
  hdr.innerHTML = `
    <div class="hdr-top">
      ${showBack ? '<button class="back" id="backBtn">&#8249;</button>' : ''}
      <h1>${title}</h1>
      <span class="step-lbl">${stepLabel}</span>
    </div>
    <div class="prog"><div class="prog-fill" style="width:${prog}%"></div></div>
  `;
  app.appendChild(hdr);
  if (showBack) hdr.querySelector('#backBtn').onclick = goBack;
}

// ── Welcome ────────────────────────────────────────────────────────────────
function renderWelcome() {
  app.innerHTML = `
    <div class="hdr"><div class="hdr-top"><h1>SG Impresiones</h1></div><div class="prog"><div class="prog-fill" style="width:0%"></div></div></div>
    <div class="welcome fade">
      <span class="logo">🖨️</span>
      <h2>Cotizá tu pedido</h2>
      <p>Respondé algunas preguntas rápidas y te armamos el detalle de tu trabajo. En menos de 2 minutos.</p>
      <button class="btn-start" onclick="startFlow()">Empezar →</button>
      <div class="footer-note">¿Preferís hablar con alguien directamente?<br><a href="https://wa.me/${WA_NUMBER}" style="color:var(--red);font-weight:700">Contactanos por WhatsApp</a></div>
    </div>
  `;
}

// ── Product selection ──────────────────────────────────────────────────────
function renderProduct() {
  renderHeader('¿Qué necesitás?', '', false);
  const c = document.createElement('div');
  c.className = 'content fade';
  c.innerHTML = `
    <span class="q-icon">🖨️</span>
    <div class="q-title">¿Qué tipo de trabajo es?</div>
    <div class="q-sub">Elegí el producto más cercano a lo que necesitás</div>
    <div class="prod-grid" id="prodGrid"></div>
    <div class="scroll-hint">↓ Deslizá para ver todos los productos</div>
  `;
  app.appendChild(c);
  const grid = c.querySelector('#prodGrid');
  Object.keys(PRODUCTS).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'prod-btn';
    btn.innerHTML = `<span class="e">${ICONS[name]||'📄'}</span>${name}`;
    btn.onclick = () => selectProduct(name);
    grid.appendChild(btn);
  });
}

// ── Spec step ─────────────────────────────────────────────────────────────
function renderSpec() {
  const step = S.steps[S.stepIdx];
  const meta = ATTR_META[step.key] || {icon:'❓', q:step.key, hint:''};
  const total = S.steps.length;
  renderHeader(S.product, `${S.stepIdx+1} de ${total}`, true);
  const c = document.createElement('div');
  c.className = 'content fade';
  c.innerHTML = `
    <span class="q-icon">${meta.icon}</span>
    <div class="q-title">${meta.q}</div>
    ${meta.hint ? `<div class="q-sub">${meta.hint}</div>` : '<div style="height:16px"></div>'}
    <div class="opts" id="optsList"></div>
  `;
  app.appendChild(c);
  const list = c.querySelector('#optsList');
  const curSel = S.sel[step.key];
  step.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (curSel === opt ? ' sel' : '');
    const label = step.key === 'Tintas' ? opt : opt;
    const sub = step.key === 'Tintas' && TINTAS[opt] ? TINTAS[opt] : '';
    btn.innerHTML = `
      <div class="opt-txt">${label}${sub ? `<span class="opt-sub">${sub}</span>` : ''}</div>
      <div class="chk">${curSel === opt ? '✓' : ''}</div>
    `;
    btn.onclick = () => selectOpt(step.key, opt);
    list.appendChild(btn);
  });
  // "No sé" option
  const noSeBtn = document.createElement('button');
  noSeBtn.className = 'opt-btn' + (curSel === 'No sé / Consultar' ? ' sel' : '');
  noSeBtn.innerHTML = `<div class="opt-txt">No sé / Consultar con el equipo<span class="opt-sub">Un asesor te va a ayudar</span></div><div class="chk">${curSel === 'No sé / Consultar' ? '✓' : ''}</div>`;
  noSeBtn.onclick = () => selectOpt(step.key, 'No sé / Consultar');
  list.appendChild(noSeBtn);
}

// ── Extra info ────────────────────────────────────────────────────────────
function renderExtra() {
  renderHeader(S.product, 'Último paso', true);
  const c = document.createElement('div');
  c.className = 'content fade';
  c.innerHTML = `
    <span class="q-icon">📋</span>
    <div class="q-title">Un poco más de info</div>
    <div class="q-sub">Para armar el presupuesto lo más completo posible</div>

    <div class="field">
      <label>Tu nombre</label>
      <input type="text" id="inp-nombre" placeholder="Ej: Lucía Gómez" value="${S.extra.nombre}" />
    </div>
    <div class="field">
      <label>¿Cuántas unidades necesitás?</label>
      <input type="number" id="inp-cant" placeholder="Ej: 500" value="${S.extra.cantidad}" min="1" />
    </div>
    <div class="field">
      <label>¿Tenés el arte / diseño listo?</label>
      <div class="yn-row">
        <button class="yn-btn${S.extra.tieneArte===true?' sel':''}" id="yn-si" onclick="setArte(true)">✅ Sí, lo tengo</button>
        <button class="yn-btn${S.extra.tieneArte===false?' sel':''}" id="yn-no" onclick="setArte(false)">🎨 Necesito diseño</button>
      </div>
      <div id="arte-section" style="display:${S.extra.tieneArte===true?'block':'none'}">
        <div class="arte-box">
          <div class="arte-box-title">📎 ¿Cómo mandar tu arte?</div>
          <div class="arte-formats">
            <div class="arte-fmt">
              <span class="arte-fmt-tag best">PDF</span>
              <div class="arte-fmt-txt"><strong>La mejor opción.</strong> Siempre funciona, conserva fuentes y colores exactos.</div>
            </div>
            <div class="arte-fmt">
              <span class="arte-fmt-tag">JPG · PNG</span>
              <div class="arte-fmt-txt">Aceptado si tiene <strong>300 DPI o más</strong> de resolución. Ver explicación abajo 👇</div>
            </div>
          </div>
          <div class="dpi-box">
            <strong>¿Qué son los DPI?</strong> Es la calidad de la imagen. Si se ve borrosa cuando la ampliás en pantalla, probablemente no alcance para imprimir bien.<br><br>
            📱 <strong>En el celular:</strong> una imagen de 3 MB o más generalmente está bien.<br>
            💻 <strong>En la compu:</strong> clic derecho sobre el archivo → Propiedades → Detalles → buscá "resolución". Tiene que decir 300 ppp o más.
          </div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>¿Para cuándo lo necesitás? <span style="font-weight:400;text-transform:none">(opcional)</span></label>
      <input type="date" id="inp-fecha" value="${S.extra.fecha}" />
    </div>

    <button class="btn-primary" id="btn-continuar" onclick="goToSummary()">Ver resumen →</button>
  `;
  app.appendChild(c);
  // save on input
  c.querySelector('#inp-nombre').oninput = e => S.extra.nombre = e.target.value;
  c.querySelector('#inp-cant').oninput = e => S.extra.cantidad = e.target.value;
  c.querySelector('#inp-fecha').oninput = e => S.extra.fecha = e.target.value;
}

// ── Summary ───────────────────────────────────────────────────────────────
function renderSummary() {
  renderHeader('Resumen', '', true);
  const c = document.createElement('div');
  c.className = 'content fade';

  // Build all selections
  const allSel = {...S.autoSel, ...S.sel};

  // Build summary rows HTML
  let rows = '';
  const ATTR_ORDER = ['Papel','Tamaño','Tintas','Doblado','Laminado','Corte y Troquel','Encuadernacion'];
  ATTR_ORDER.forEach(k => {
    const v = allSel[k];
    if (!v) return;
    const label = k === 'Encuadernacion' ? 'Encuadernación' : k;
    rows += `<div class="sum-row"><span class="sum-k">${label}</span><span class="sum-v">${displayVal(k,v)}</span></div>`;
  });
  if (S.extra.cantidad) rows += `<div class="sum-row"><span class="sum-k">Cantidad</span><span class="sum-v">${S.extra.cantidad} unidades</span></div>`;
  if (S.extra.tieneArte !== null) rows += `<div class="sum-row"><span class="sum-k">Arte/Diseño</span><span class="sum-v">${S.extra.tieneArte ? 'Cliente entrega arte' : 'Necesita diseño'}</span></div>`;
  if (S.extra.fecha) {
    const d = new Date(S.extra.fecha+'T12:00:00');
    rows += `<div class="sum-row"><span class="sum-k">Fecha necesaria</span><span class="sum-v">${d.toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}</span></div>`;
  }

  // Build WA message
  const msg = buildWAMessage(allSel);
  const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;

  c.innerHTML = `
    <div class="q-title" style="margin-bottom:16px">¡Listo! Este es tu pedido 👇</div>
    <div class="sum-card">
      <div class="sum-prod">${ICONS[S.product]||'📄'} ${S.product}</div>
      ${S.extra.nombre ? `<div class="sum-tag">Para: ${S.extra.nombre}</div>` : ''}
      <div class="sum-rows">${rows}</div>
    </div>
    <div class="sum-note">Enviá este detalle por WhatsApp y te respondemos con el presupuesto 🚀</div>
    <a class="btn-wa" href="${waLink}" target="_blank" onclick="logToSheets()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      Enviar por WhatsApp
    </a>
    ${S.extra.tieneArte ? `
    <div style="background:#FFFBEA;border:1.5px solid #FFD966;border-radius:12px;padding:13px 15px;margin-top:12px;font-size:13.5px;color:#5A4000;line-height:1.55">
      📎 <strong>Adjuntá tu arte en el mismo chat</strong> que se va a abrir.<br>
      Formatos aceptados: <strong>PDF</strong> (ideal) · <strong>JPG o PNG</strong> a 300 DPI o más.
    </div>` : ''}
    <a class="btn-human" href="https://wa.me/${WA_NUMBER}" target="_blank">
      👤 Hablar con un asesor
    </a>
    <button class="btn-primary" style="background:#eee;color:#444;margin-top:10px;font-weight:600" onclick="restart()">Hacer otra consulta</button>
  `;
  app.appendChild(c);
}

// ─────────────────────────────────────────────────────────────────────────────
// WA MESSAGE
// ─────────────────────────────────────────────────────────────────────────────
function buildWAMessage(allSel) {
  let msg = `¡Hola! Quiero consultar precio para:\n\n`;
  msg += `*Producto:* ${S.product}\n`;
  const ATTR_ORDER = ['Papel','Tamaño','Tintas','Doblado','Laminado','Corte y Troquel','Encuadernacion'];
  ATTR_ORDER.forEach(k => {
    const v = allSel[k];
    if (!v) return;
    const label = k === 'Encuadernacion' ? 'Encuadernación' : k;
    const display = k === 'Tintas' && TINTAS[v] ? `${v} (${TINTAS[v]})` : v;
    msg += `*${label}:* ${display}\n`;
  });
  if (S.extra.cantidad) msg += `*Cantidad:* ${S.extra.cantidad} unidades\n`;
  if (S.extra.tieneArte !== null) msg += `*Arte:* ${S.extra.tieneArte ? 'Lo mando adjunto en este chat' : 'Necesito diseño'}\n`;
  if (S.extra.fecha) {
    const d = new Date(S.extra.fecha+'T12:00:00');
    msg += `*Lo necesito para:* ${d.toLocaleDateString('es-AR',{day:'numeric',month:'long'})}\n`;
  }
  if (S.extra.nombre) msg += `\n_Soy ${S.extra.nombre}_`;
  return msg;
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function startFlow() {
  S.screen = 'product';
  render();
}

function selectProduct(name) {
  S.product = name;
  S.sel = {};
  S.stepIdx = 0;
  const {auto, steps} = buildSteps(name);
  S.autoSel = auto;
  S.steps = steps;
  if (steps.length === 0) {
    S.screen = 'extra';
  } else {
    S.screen = 'spec';
  }
  render();
}

function selectOpt(key, val) {
  S.sel[key] = val;
  // auto-advance
  setTimeout(() => {
    S.stepIdx++;
    if (S.stepIdx >= S.steps.length) {
      S.screen = 'extra';
    }
    render();
  }, 180);
}

function setArte(val) {
  S.extra.tieneArte = val;
  document.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById(val ? 'yn-si' : 'yn-no').classList.add('sel');
  const as = document.getElementById('arte-section');
  if (as) as.style.display = val ? 'block' : 'none';
}

function goToSummary() {
  // save current extra values
  const n = document.getElementById('inp-nombre');
  const q = document.getElementById('inp-cant');
  const f = document.getElementById('inp-fecha');
  if(n) S.extra.nombre = n.value;
  if(q) S.extra.cantidad = q.value;
  if(f) S.extra.fecha = f.value;
  S.screen = 'summary';
  render();
}

function goBack() {
  if (S.screen === 'spec') {
    if (S.stepIdx === 0) {
      S.screen = 'product';
    } else {
      S.stepIdx--;
    }
  } else if (S.screen === 'extra') {
    if (S.steps.length === 0) S.screen = 'product';
    else { S.screen = 'spec'; S.stepIdx = S.steps.length - 1; }
  } else if (S.screen === 'summary') {
    S.screen = 'extra';
  } else if (S.screen === 'product') {
    S.screen = 'welcome';
  }
  render();
}

function restart() {
  S.screen = 'welcome';
  S.product = null;
  S.steps = [];
  S.autoSel = {};
  S.stepIdx = 0;
  S.sel = {};
  S.extra = {nombre:'',cantidad:'',tieneArte:null,fecha:''};
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
