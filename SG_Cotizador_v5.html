<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SG Impresiones · Cotizá tu pedido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cyan:#00A8E8;
  --cyan-dark:#0088C2;
  --cyan-light:#E0F5FD;
  --cyan-bg:#F0FAFF;
  --yellow:#FFE600;
  --yellow-dark:#E6CE00;
  --dark:#111827;
  --sub:#4B6B7A;
  --border:#B8DFF0;
  --card:#fff;
  --wa:#25D366;
  --green:#1E7A3E;
}
html{background:var(--cyan-bg)}
body{
  font-family:'Barlow',system-ui,-apple-system,sans-serif;
  background:var(--cyan-bg);color:var(--dark);
  min-height:100vh;max-width:480px;margin:0 auto
}

/* ── Header ── */
.hdr{background:var(--cyan);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:20;
  box-shadow:0 2px 12px rgba(0,168,232,.35)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:.5px;
  text-transform:uppercase;flex:1;display:flex;align-items:center;gap:0}
.hdr-logo .sg{background:var(--yellow);color:var(--dark);padding:1px 7px;border-radius:4px;margin-right:7px;font-size:18px}
.hdr-top .step-lbl{font-size:11px;opacity:.85;white-space:nowrap;background:rgba(0,0,0,.15);
  padding:3px 8px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 6px;border-radius:6px;line-height:1}
.back:hover{background:rgba(0,0,0,.15)}
.prog{height:4px;background:rgba(0,0,0,.2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--yellow);border-radius:2px;transition:width .35s ease}

/* ── Content ── */
.content{padding:20px 16px 40px}

/* ── Question ── */
.q-icon{font-size:36px;margin-bottom:8px;display:block}
.q-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;
  color:var(--dark);line-height:1.15;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.q-sub{font-size:13px;color:var(--sub);margin-bottom:20px;font-weight:500}

/* ── Supercategory grid ── */
.supercat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.supercat-btn{
  background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:0;cursor:pointer;font-family:'Barlow',sans-serif;
  transition:all .15s;display:flex;flex-direction:column;overflow:hidden;
  min-height:120px;text-align:left
}
.supercat-btn .sc-img{
  width:100%;height:72px;object-fit:cover;display:block;background:#dde8ee;flex-shrink:0
}
.supercat-btn .sc-label{
  padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;justify-content:center
}
.supercat-btn .sc-name{font-size:13px;font-weight:800;color:var(--dark);line-height:1.2;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.3px}
.supercat-btn .sc-count{font-size:11px;color:var(--sub);font-weight:500;margin-top:2px}
.supercat-btn:hover,.supercat-btn:active{border-color:var(--cyan);background:var(--cyan-light)}
.supercat-btn:hover .sc-name,.supercat-btn:active .sc-name{color:var(--cyan-dark)}

/* ── Product grid ── */
.prod-grid{display:flex;flex-direction:column;gap:9px}
.prod-btn{
  background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:0;text-align:left;cursor:pointer;
  font-size:14px;font-weight:700;color:var(--dark);font-family:'Barlow',sans-serif;
  transition:all .15s;display:flex;flex-direction:row;align-items:center;gap:0;
  min-height:72px;overflow:hidden;line-height:1.3
}
.prod-btn .prod-img{
  width:88px;min-width:88px;height:72px;object-fit:cover;
  border-radius:11px 0 0 11px;display:block;background:#dde8ee;flex-shrink:0
}
.prod-btn .prod-label{
  flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:2px
}
.prod-btn .prod-name{font-size:14px;font-weight:700;color:var(--dark);line-height:1.25}
.prod-btn .prod-cat{font-size:11px;font-weight:500;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.prod-btn .prod-arrow{color:var(--border);font-size:18px;padding-right:14px;flex-shrink:0;font-weight:300}
.prod-btn:hover,.prod-btn:active{border-color:var(--cyan);background:var(--cyan-light)}
.prod-btn:hover .prod-name,.prod-btn:active .prod-name{color:var(--cyan-dark)}
.prod-btn:hover .prod-arrow,.prod-btn:active .prod-arrow{color:var(--cyan)}

/* ── Option list ── */
.opts{display:flex;flex-direction:column;gap:9px}
.opt-btn{
  background:var(--card);border:2px solid var(--border);border-radius:12px;
  padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;
  font-size:14px;font-weight:600;color:var(--dark);transition:all .15s;text-align:left;
  font-family:'Barlow',sans-serif
}
.opt-btn .opt-txt{flex:1;line-height:1.3}
.opt-btn .opt-sub{font-size:11.5px;color:var(--sub);font-weight:400;margin-top:3px;display:block;line-height:1.35}
.opt-btn .opt-code{font-size:10px;color:var(--sub);font-weight:700;font-family:monospace;
  background:#E8F4FB;border-radius:4px;padding:1px 6px;margin-left:7px;vertical-align:middle;
  letter-spacing:.5px;border:1px solid var(--border)}
.opt-btn .chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.opt-btn:hover,.opt-btn:active{border-color:var(--cyan);background:var(--cyan-light)}
.opt-btn.sel{border-color:var(--cyan);background:var(--cyan-light);color:var(--cyan-dark)}
.opt-btn.sel .chk{background:var(--cyan);border-color:var(--cyan);color:#fff}

/* ── Extra info form ── */
.field{margin-bottom:18px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--sub);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;font-family:'Barlow Condensed',sans-serif;font-size:13px}
.field input,.field select{
  width:100%;border:2px solid var(--border);border-radius:10px;
  padding:13px 14px;font-size:15px;color:var(--dark);background:var(--card);outline:none;
  font-family:'Barlow',sans-serif;appearance:none
}
.field input:focus,.field select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,168,232,.12)}
.yn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.yn-btn{
  background:var(--card);border:2px solid var(--border);border-radius:10px;
  padding:13px;text-align:center;cursor:pointer;font-size:13.5px;font-weight:700;
  color:var(--dark);transition:all .15s;font-family:'Barlow',sans-serif
}
.yn-btn:hover{border-color:var(--cyan);background:var(--cyan-light)}
.yn-btn.sel{border-color:var(--green);background:#E8F5EE;color:var(--green)}

/* ── Summary ── */
.sum-card{background:var(--card);border-radius:16px;padding:20px;border:2px solid var(--border);margin-bottom:14px}
.sum-prod{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;
  color:var(--dark);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.sum-tag{display:inline-block;background:var(--cyan-light);color:var(--cyan-dark);
  border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;margin-bottom:16px;
  border:1px solid var(--border)}
.sum-rows{display:flex;flex-direction:column;gap:0}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;
  padding:9px 0;border-bottom:1px solid var(--border);gap:12px}
.sum-row:last-child{border-bottom:none;padding-bottom:0}
.sum-k{font-size:12.5px;color:var(--sub);font-weight:600;min-width:110px}
.sum-v{font-size:13.5px;font-weight:700;text-align:right;color:var(--dark);flex:1}
.sum-note{font-size:12px;color:var(--sub);text-align:center;margin-bottom:6px}

/* ── Buttons ── */
.btn-primary{
  background:var(--cyan);color:#fff;border:none;border-radius:12px;
  padding:16px;width:100%;font-size:16px;font-weight:800;cursor:pointer;
  margin-top:20px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.8px;transition:background .15s
}
.btn-primary:hover{background:var(--cyan-dark)}
.btn-primary:disabled{background:#aaa;cursor:not-allowed}
.btn-wa{
  background:var(--wa);color:#fff;border:none;border-radius:12px;
  padding:16px;width:100%;font-size:16px;font-weight:800;cursor:pointer;
  margin-top:12px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.8px;display:flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none;transition:background .15s
}
.btn-wa:hover{background:#1eba56}
.btn-human{
  background:transparent;color:var(--cyan-dark);border:2px solid var(--cyan);
  border-radius:12px;padding:13px;width:100%;font-size:14px;font-weight:700;cursor:pointer;
  margin-top:8px;font-family:'Barlow',sans-serif;display:flex;align-items:center;
  justify-content:center;gap:8px;text-decoration:none;transition:all .15s
}
.btn-human:hover{background:var(--cyan-light)}

/* ── Welcome ── */
.welcome{background:var(--cyan);min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 24px;text-align:center;position:relative;overflow:hidden}

.welcome-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;
  color:rgba(255,255,255,.9);text-transform:uppercase;letter-spacing:1px;margin-bottom:40px;
  display:flex;align-items:center;gap:10px}
.welcome-logo .sg-box{background:var(--yellow);color:var(--dark);padding:4px 12px;border-radius:6px;font-size:24px}
.welcome h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;
  color:#fff;text-transform:uppercase;letter-spacing:.5px;line-height:1.05;margin-bottom:8px}
.welcome h2 .hl{background:var(--yellow);color:var(--dark);padding:0 8px;display:inline-block;
  border-radius:4px;margin-top:4px}
.welcome p{color:rgba(255,255,255,.85);font-size:15px;line-height:1.5;margin-bottom:36px;max-width:300px}
.btn-start{
  background:var(--yellow);color:var(--dark);border:none;border-radius:14px;
  padding:18px 36px;font-size:18px;font-weight:900;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:1px;
  display:inline-flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.2)
}
.btn-start:hover{background:var(--yellow-dark)}
.footer-note{font-size:12.5px;color:rgba(255,255,255,.7);text-align:center;margin-top:18px;line-height:1.6}
.footer-note a{color:#fff;font-weight:700;text-decoration:none}
.divider{height:1px;background:var(--border);margin:12px 0}

/* ── Animation ── */
.fade{animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Scroll product list ── */
.scroll-hint{font-size:12px;color:var(--sub);text-align:center;padding:8px 0 0}

/* ── Summary product icon strip ── */
.sum-header{background:var(--cyan);border-radius:12px;padding:16px 20px;margin-bottom:14px;
  display:flex;align-items:center;gap:14px}
.sum-header .sh-icon{font-size:32px}
.sum-header .sh-prod{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;
  color:#fff;text-transform:uppercase;letter-spacing:.5px}
.sum-header .sh-sub{font-size:12px;color:rgba(255,255,255,.8);font-weight:500}
/* ── Arte info box ── */
.arte-box{background:#FFFBEA;border:2px solid var(--yellow-dark);border-radius:14px;padding:16px;margin-top:12px}

.arte-fmt-tag{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;background:var(--dark);color:#fff;border-radius:6px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.arte-fmt-tag.best{background:var(--cyan)}
.arte-fmt-txt{font-size:13px;color:var(--dark);line-height:1.45}
.arte-fmt-txt strong{font-weight:700}
.dpi-box{background:var(--cyan-light);border-radius:10px;padding:10px 12px;font-size:12.5px;color:#005070;line-height:1.6}
.dpi-box strong{font-weight:700}

// ─────────────────────────────────────────────────────────────────────────────
// LOGIC
// ─────────────────────────────────────────────────────────────────────────────
function buildSteps(prod) {
  const data = PRODUCTS[prod] || {};
  const auto = {}, steps = [];
  for (const [k, opts] of Object.entries(data)) {
    const filtered = opts.filter(o => o !== 'No' || opts.length > 1);
    if (opts.length === 0) continue;
    if (opts.length === 1) { auto[k] = opts[0]; continue; }
    // if all are "No" or single choice after filter, auto
    steps.push({key:k, options:opts});
  }
  return {auto, steps};
}

function displayVal(key, val) {
  if ((key === 'Tintas' || key === 'Tintas tapa' || key === 'Tintas interior') && TINTAS[val]) return `${TINTAS[val][0]} (${TINTAS[val][1]})`;
  return val;
}

function getOptSub(key, val) {
  if (key === 'Tintas' || key === 'Tintas tapa' || key === 'Tintas interior') return null; // handled inline
  if (key === 'Papel' || key === 'Papel tapa' || key === 'Papel interior')    return PAPEL_DESC[val]   || null;
  if (key === 'Tamaño')          return TAMAÑO_DESC[val]  || null;
  if (key === 'Doblado')         return DOBLADO_DESC[val] || null;
  if (key === 'Laminado' || key === 'Laminado tapa') return LAMINADO_DESC[val]|| null;
  if (key === 'Corte y Troquel') return CORTE_DESC[val]   || null;
  if (key === 'Encuadernacion')  return ENCUAD_DESC[val]  || null;
  return null;
}

function totalSteps() { return S.steps.length + 2; }
function currentProgress() {
  if (S.screen === 'welcome')   return 0;
  if (S.screen === 'supercat')  return 4;
  if (S.screen === 'product')   return 10;
  if (S.screen === 'spec') return 15 + Math.round(((S.stepIdx+1)/totalSteps())*70);
  if (S.screen === 'extra')     return 88;
  return 100;
}

// ─────────────────────────────────────────────────────────────────────────────
// GOOGLE SHEETS LOGGING
// ─────────────────────────────────────────────────────────────────────────────
function logToSheets() {
  if (!SHEETS_URL || SHEETS_URL === 'PEGAR_URL_DEL_SCRIPT_ACÁ') return;
  const allSel = {...S.autoSel, ...S.sel};
  const data = {
    nombre: S.extra.nombre, producto: S.product,
    papel: allSel['Papel']||'', tamano: allSel['Tamaño']||'',
    tintas: allSel['Tintas'] ? (TINTAS[allSel['Tintas']] ? TINTAS[allSel['Tintas']][0] : allSel['Tintas']) : '',
    doblado: allSel['Doblado']||'', laminado: allSel['Laminado']||'',
    corte: allSel['Corte y Troquel']||'', encuadernacion: allSel['Encuadernacion']||'',
    cantidad: S.extra.cantidad,
    arte: S.extra.tieneArte === null ? '' : S.extra.tieneArte ? 'Entrega arte' : 'Necesita diseño',
    fecha: S.extra.fecha,
  };
  fetch(SHEETS_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}).catch(()=>{});
}

// RENDER ENGINE

const app = document.getElementById('app');
function render() {
  app.innerHTML = '';
  app.className = 'fade';
  if (S.screen === 'welcome') renderWelcome();
  else if (S.screen === 'supercat') renderSupercat();
  else if (S.screen === 'otros') renderOtros();
  else if (S.screen === 'adhesivos') renderAdhesivos();
  else if (S.screen === 'product') renderProduct();
  else if (S.screen === 'spec') renderSpec();
  else if (S.screen === 'extra') renderExtra();
  else if (S.screen === 'summary') renderSummary();
}

// ── Flujo guiado: Autoadhesivos e Imanes ─────────────────────────────────
function resolverMaterial() {
  const { uso, exterior, look } = S.adh;

  // Imán: siempre directo
  if (uso === 'metal') return 'Imán';

  // Exterior/humedad limita a OPP y Vinilo
  if (exterior === 'si') {
    if (look === 'transparente') return 'OPP Transparente';
    if (look === 'metalico')     return 'OPP Plateado';
    return 'OPP Blanco';
  }

  // Interior: rango completo
  if (look === 'clasico')      return uso === 'packaging' ? 'Sticker autoadhesivo' : 'Sticker autoadhesivo';
  if (look === 'kraft')        return 'Sticker craft';
  if (look === 'transparente') return 'OPP Transparente';
  if (look === 'plateado')     return 'OPP Plateado';
  if (look === 'dorado')       return 'OPP Dorado';
  if (look === 'holografico')  return 'OPP Holográfico';
  return 'Sticker autoadhesivo';
}

function finalizarAdhesivos() {
  const material = resolverMaterial();
  // Inyectar el material como si el cliente lo hubiera elegido en el flujo normal
  S.sel['Papel'] = material;
  // Armar el resto de los pasos (tamaño, tintas, corte) desde PRODUCTS
  const { auto, steps } = buildSteps('Autoadhesivos e Imanes');
  S.autoSel = auto;
  // Filtrar solo los pasos que no sean Papel (ya lo resolvimos)
  S.steps = steps.filter(s => s.key !== 'Papel');
  S.stepIdx = 0;
  if (S.steps.length === 0) {
    S.screen = 'extra';
  } else {
    S.screen = 'spec';
  }
  render();
}

    const txt = textarea.value.trim();
    const msg = txt
      ? `¡Hola! Necesito consultar sobre un trabajo:\n\n${txt}`
      : `¡Hola! Quiero consultar sobre un trabajo que no encontré en el cotizador.`;
    btnWa.href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  }
  textarea.addEventListener('input', updateWaLink);
  updateWaLink();
}

// ── Supercategory selection ────────────────────────────────────────────────
function renderSupercat() {

// ── Product selection ──────────────────────────────────────────────────────
function renderProduct() {
  renderHeader(S.supercat ? S.supercat.name : '¿Qué necesitás?', '', true);
  const c = document.createElement('div');
  c.className = 'content fade';
  c.innerHTML = `
    <span class="q-icon">🖨️</span>
    <div class="q-title">¿Qué tipo de trabajo es?</div>
    <div class="q-sub">Elegí el producto más cercano a lo que necesitás</div>
    <div class="prod-grid" id="prodGrid"></div>
    <div class="scroll-hint">↓ Deslizá para ver todos los productos</div>
  `;
  app.appendChild(c);
  const grid = c.querySelector('#prodGrid');
  const visibleProducts = S.supercat ? S.supercat.products : Object.keys(PRODUCTS);
  visibleProducts.forEach(name => {
    if (!PRODUCTS[name]) return;
    const btn = document.createElement('button');
    btn.className = 'prod-btn';
    const imgSrc = PRODUCT_IMGS[name] || 'https://images.unsplash.com/photo-1586953208448-b95a79798f07?w=200&h=144&fit=crop&auto=format';
    const cat = PRODUCT_CATS[name] || '';
    btn.innerHTML = `
      <img class="prod-img" src="${imgSrc}" alt="${name}" loading="lazy" onerror="this.style.background='#B8DFF0';this.removeAttribute('src')">
      <div class="prod-label">
        <span class="prod-cat">${cat}</span>
        <span class="prod-name">${name}</span>
      </div>
      <span class="prod-arrow">›</span>
    `;
    btn.onclick = () => selectProduct(name);
    grid.appendChild(btn);
  });
}

// ── Spec step ─────────────────────────────────────────────────────────────
function renderSpec() {
  const step = S.steps[S.stepIdx];
  const meta = ATTR_META[step.key] || {icon:'❓', q:step.key, hint:''};
  const total = S.steps.length;
  renderHeader(S.product, `${S.stepIdx+1} de ${total}`, true);
  const c = document.createElement('div');
  c.className = 'content fade';
  c.innerHTML = `
    <span class="q-icon">${meta.icon}</span>
    <div class="q-title">${meta.q}</div>
    ${meta.hint ? `<div class="q-sub">${meta.hint}</div>` : '<div style="height:16px"></div>'}
    <div class="opts" id="optsList"></div>
  `;
  app.appendChild(c);
  const list = c.querySelector('#optsList');
  const curSel = S.sel[step.key];
  step.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (curSel === opt ? ' sel' : '');
    let mainLabel, subLabel, techCode;
    if ((step.key === 'Tintas' || step.key === 'Tintas tapa' || step.key === 'Tintas interior') && TINTAS[opt]) {
      mainLabel = TINTAS[opt][0];
      techCode  = TINTAS[opt][1];
      subLabel  = null;
    } else {
      mainLabel = opt;
      techCode  = null;
      subLabel  = getOptSub(step.key, opt);
    }
    btn.innerHTML = `
      <div class="opt-txt">
        ${mainLabel}
        ${techCode  ? `<span class="opt-code">${techCode}</span>` : ''}
        ${subLabel  ? `<span class="opt-sub">${subLabel}</span>` : ''}
      </div>
      <div class="chk">${curSel === opt ? '✓' : ''}</div>
    `;
    btn.onclick = () => selectOpt(step.key, opt);
    list.appendChild(btn);
  });
  // "No sé" option
  const noSeBtn = document.createElement('button');
  noSeBtn.className = 'opt-btn' + (curSel === 'No sé / Consultar' ? ' sel' : '');
  noSeBtn.innerHTML = `<div class="opt-txt">No sé / Consultar con el equipo<span class="opt-sub">Un asesor te va a ayudar</span></div><div class="chk">${curSel === 'No sé / Consultar' ? '✓' : ''}</div>`;
  noSeBtn.onclick = () => selectOpt(step.key, 'No sé / Consultar');
  list.appendChild(noSeBtn);
}

  c.querySelector('#inp-cant').oninput = e => S.extra.cantidad = e.target.value;

function renderSummary() {
  renderHeader('Resumen', '', true);
  const c = document.createElement('div');
  c.className = 'content fade';

  // Build all selections
  const allSel = {...S.autoSel, ...S.sel};

  // Build summary rows HTML
  let rows = '';
  const ATTR_ORDER = ['Tamaño','Papel','Papel tapa','Laminado tapa','Tintas tapa','Papel interior','Tintas interior','Tintas','Doblado','Laminado','Corte y Troquel','Encuadernacion'];
  ATTR_ORDER.forEach(k => {
    const v = allSel[k];
    if (!v) return;
    const LABEL_MAP = {
      'Encuadernacion':'Encuadernación','Papel tapa':'Papel tapa','Laminado tapa':'Laminado tapa',
      'Tintas tapa':'Tintas tapa','Papel interior':'Papel interior','Tintas interior':'Tintas interior'
    };
    const label = LABEL_MAP[k] || k;
    rows += `<div class="sum-row"><span class="sum-k">${label}</span><span class="sum-v">${displayVal(k,v)}</span></div>`;
  });
  if (S.extra.cantidad) rows += `<div class="sum-row"><span class="sum-k">Cantidad</span><span class="sum-v">${S.extra.cantidad} unidades</span></div>`;
  if (S.extra.tieneArte !== null) rows += `<div class="sum-row"><span class="sum-k">Arte/Diseño</span><span class="sum-v">${S.extra.tieneArte ? 'Cliente entrega arte' : 'Necesita diseño'}</span></div>`;
  if (S.extra.fecha) {
    const d = new Date(S.extra.fecha+'T12:00:00');
    rows += `<div class="sum-row"><span class="sum-k">Fecha necesaria</span><span class="sum-v">${d.toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}</span></div>`;
  }

  // Build WA message
  const msg = buildWAMessage(allSel);
  const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;

  c.innerHTML = `
    <div class="sum-header">
      <span class="sh-icon">${ICONS[S.product]||'📄'}</span>
      <div><div class="sh-prod">${S.product}</div>
      ${S.extra.nombre ? `<div class="sh-sub">Para: ${S.extra.nombre}</div>` : '<div class="sh-sub">Tu pedido está listo 🎉</div>'}</div>

    <div class="sum-card">
      <div class="sum-rows">${rows}</div>
    </div>
    <div class="sum-note">Enviá este detalle por WhatsApp y te respondemos con el presupuesto 🚀</div>
    <a class="btn-wa" href="${waLink}" target="_blank" onclick="logToSheets()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      Enviar por WhatsApp
    </a>
    ${S.extra.tieneArte ? `<div style="background:#FFFBEA;border:1.5px solid #FFD966;border-radius:12px;padding:13px 15px;margin-top:12px;font-size:13.5px;color:#5A4000;line-height:1.55">📎 <strong>Adjuntá tu arte en el mismo chat</strong> que se va a abrir.<br>Formatos aceptados: <strong>PDF</strong> (ideal) · <strong>JPG o PNG</strong> a 300 DPI o más.</div>` : ''}
    <a class="btn-human" href="https://wa.me/${WA_NUMBER}" target="_blank">
      👤 Hablar con un asesor

    <button class="btn-primary" style="background:#eee;color:#444;margin-top:10px;font-weight:600" onclick="restart()">Hacer otra consulta</button>

// ─────────────────────────────────────────────────────────────────────────────
// WA MESSAGE
// ─────────────────────────────────────────────────────────────────────────────
function buildWAMessage(allSel) {
  let msg = `¡Hola! Quiero consultar precio para:\n\n`;
  msg += `*Producto:* ${S.product}\n`;
  const ATTR_ORDER = ['Tamaño','Papel','Papel tapa','Laminado tapa','Tintas tapa','Papel interior','Tintas interior','Tintas','Doblado','Laminado','Corte y Troquel','Encuadernacion'];
  ATTR_ORDER.forEach(k => {
    const v = allSel[k];
    if (!v) return;
    const LABEL_MAP = {
      'Encuadernacion':'Encuadernación','Papel tapa':'Papel tapa','Laminado tapa':'Laminado tapa',
      'Tintas tapa':'Tintas tapa','Papel interior':'Papel interior','Tintas interior':'Tintas interior'
    };
    const label = LABEL_MAP[k] || k;
    const display = (k === 'Tintas' || k === 'Tintas tapa' || k === 'Tintas interior') && TINTAS[v] ? `${TINTAS[v][0]} (${TINTAS[v][1]})` : v;
    msg += `*${label}:* ${display}\n`;
  });
  if (S.extra.cantidad) msg += `*Cantidad:* ${S.extra.cantidad} unidades\n`;
  if (S.extra.tieneArte !== null) msg += `*Arte:* ${S.extra.tieneArte ? 'Lo mando adjunto en este chat' : 'Necesito diseño'}\n`;
  if (S.extra.fecha) {
    const d = new Date(S.extra.fecha+'T12:00:00');
    msg += `*Lo necesito para:* ${d.toLocaleDateString('es-AR',{day:'numeric',month:'long'})}\n`;
  }
  if (S.extra.nombre) msg += `\n_Soy ${S.extra.nombre}_`;
  return msg;
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function startFlow() {
  S.screen = 'supercat';
  render();
}

function selectSupercat(sc) {
  S.supercat = sc;
  if (sc.id === 'otros') {
    S.screen = 'otros';
  } else if (sc.products.length === 1) {
    selectProduct(sc.products[0]);
  } else {
    S.screen = 'product';
  }
  render();
}

function selectProduct(name) {
  S.product = name;
  S.sel = {};
  S.stepIdx = 0;
  S.adh = { uso:null, exterior:null, look:null };
  if (name === 'Autoadhesivos e Imanes') {
    S.screen = 'adhesivos';
    render();
    return;
  }
  const {auto, steps} = buildSteps(name);
  S.autoSel = auto;
  S.steps = steps;
  if (steps.length === 0) {
    S.screen = 'extra';
  } else {
    S.screen = 'spec';
  }
  render();
}

function selectOpt(key, val) {
  S.sel[key] = val;
  // auto-advance
  setTimeout(() => {
    S.stepIdx++;
    if (S.stepIdx >= S.steps.length) {
      S.screen = 'extra';
    }
    render();
  }, 180);
}

function setArte(val) {
  S.extra.tieneArte = val;
  document.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById(val ? 'yn-si' : 'yn-no').classList.add('sel');
  const as = document.getElementById('arte-section');
  if (as) as.style.display = val ? 'block' : 'none';
}

function goToSummary() {
  // save current extra values
  const n = document.getElementById('inp-nombre');
  const q = document.getElementById('inp-cant');
  const f = document.getElementById('inp-fecha');
  if(n) S.extra.nombre = n.value;
  if(q) S.extra.cantidad = q.value;
  if(f) S.extra.fecha = f.value;
  S.screen = 'summary';
  render();
}

function goBack() {
  if (S.screen === 'otros') {
    S.screen = 'supercat';
  } else if (S.screen === 'adhesivos') {
    // retroceder dentro del flujo guiado según qué paso completó
    if (S.adh.look !== null)          { S.adh.look = null; S.adh.exterior = null; }
    else if (S.adh.exterior !== null) { S.adh.exterior = null; }
    else if (S.adh.uso !== null)      { S.adh.uso = null; }
    else                              { S.screen = 'product'; }
  } else if (S.screen === 'product') {
    S.screen = 'supercat';
  } else if (S.screen === 'spec') {
    if (S.stepIdx === 0) {
      S.screen = S.supercat && S.supercat.products.length === 1 ? 'supercat' : 'product';
    } else {
      S.stepIdx--;
    }
  } else if (S.screen === 'extra') {
    if (S.steps.length === 0) {
      S.screen = S.supercat && S.supercat.products.length === 1 ? 'supercat' : 'product';
    } else { S.screen = 'spec'; S.stepIdx = S.steps.length - 1; }
  } else if (S.screen === 'summary') {
    S.screen = 'extra';
  } else if (S.screen === 'supercat') {
    S.screen = 'welcome';
  }
  render();
}

function restart() {
  S.screen = 'welcome';
  S.supercat = null;
  S.product = null;
  S.steps = [];
  S.autoSel = {};
  S.stepIdx = 0;
  S.sel = {};
  S.extra = {nombre:'',cantidad:'',tieneArte:null,fecha:''};
  S.adh = { uso:null, exterior:null, look:null };
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
render();
</script>
